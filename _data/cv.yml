    location: "Granada, Spain"
    start: "2016"
    end: "2020"
    status: "completed"
    grade: "8.629 / 10"
    thesis_title: "Interconnection of Members of an Emergency Response Team in Areas Without Coverage Using Mobile Devices"
    thesis_description: "Design and pilot trials of a LoRaWAN architecture for IoT communications in areas without network coverage, deployed using real hardware. This thesis obtained the highest possible mark and was granted the first position in the 8th edition of the B.Sc. Thesis Awards of the Dpt. Signal Theory, Telematics and Communications of the University of Granada in the category of Telematics Engineering. In addition, it was granted the second position (“accesit”) in the Ingenio Awards 2020 from the Andalusian Official Association of B.Sc. Telecommunications Engineers and the third position in the Excellence in Telecommunications Engineering Awards 2021 from the Spanish Official Association of Telecommunications Engineers."
    thesis_doc: "https://wpd.ugr.es/~jorgenavarro/thesis/2020_TFG_FelixDelgadoFerro.pdf"
    supervisors: "Prof. Jorge Navarro-Ortiz"

