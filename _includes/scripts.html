<script>
// Dark mode
(function(){
  var btn   = document.getElementById('dark-mode-toggle');
  var icon  = document.getElementById('dm-icon');
  var saved = localStorage.getItem('darkMode') === 'true';

  function apply(dark){
    document.body.classList.toggle('dark-mode', dark);
    document.documentElement.classList.remove('dark-mode-pre');
    localStorage.setItem('darkMode', dark);
    if(icon) icon.textContent = dark ? '☀' : '☾';
  }

  apply(saved);
  if(btn) btn.addEventListener('click', function(){ apply(!document.body.classList.contains('dark-mode')); });
})();

// Mobile hamburger
(function(){
  var btn    = document.getElementById('hamburger');
  var mobile = document.getElementById('nav-mobile');
  if(!btn || !mobile) return;
  btn.addEventListener('click', function(){
    mobile.classList.toggle('open');
  });
  // close on link click
  mobile.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click', function(){ mobile.classList.remove('open'); });
  });
})();

// Fade-in on scroll
(function(){
  var els = document.querySelectorAll('.fade-in');
  if(!els.length) return;
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); }
    });
  }, { threshold: 0.06 });
  els.forEach(function(el){ io.observe(el); });
})();

// Publication year filter
(function(){
  var sel = document.getElementById('year-filter');
  if(!sel) return;
  sel.addEventListener('change', function(){
    var val = this.value;
    document.querySelectorAll('.publication-card').forEach(function(c){
      c.style.display = (val === 'all' || c.dataset.year === val) ? '' : 'none';
    });
    document.querySelectorAll('.pub-year-group').forEach(function(g){
      var vis = g.querySelectorAll('.publication-card:not([style*="none"])').length;
      g.style.display = vis ? '' : 'none';
    });
  });
})();
</script>
