<script>
(function(){
  var btn  = document.getElementById('dark-mode-toggle');
  var icon = document.getElementById('dm-icon');
  var root = document.documentElement;

  function apply(dark){
    // Una sola fuente de verdad: <html>
    root.classList.toggle('dark-mode', dark);
    // Sincroniza body por si algún selector CSS lo necesita
    document.body.classList.toggle('dark-mode', dark);
    localStorage.setItem('darkMode', dark ? 'true' : 'false');
    if(icon) icon.textContent = dark ? '☀' : '☾';
  }

  // Lee el estado actual ya aplicado por head.html al <html>
  apply(root.classList.contains('dark-mode'));

  if(btn){
    btn.addEventListener('click', function(){
      apply(!root.classList.contains('dark-mode'));
    });
  }
})();


// Mobile hamburger
(function(){
  var btn    = document.getElementById('hamburger');
  var mobile = document.getElementById('nav-mobile');
  if(!btn || !mobile) return;
  btn.addEventListener('click', function(){
    mobile.classList.toggle('open');
  });
  // close on link click
  mobile.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click', function(){ mobile.classList.remove('open'); });
  });
})();

// Project Cards
function toggleProject(btn) {
  var body = btn.nextElementSibling;
  var isOpen = btn.classList.contains('open');
  btn.classList.toggle('open', !isOpen);
  body.classList.toggle('open', !isOpen);
}

// Fade-in on scroll
(function(){
  var els = document.querySelectorAll('.fade-in');
  if(!els.length) return;
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); }
    });
  }, { threshold: 0.06 });
  els.forEach(function(el){ io.observe(el); });
})();

// Publication year filter
(function(){
  var sel = document.getElementById('year-filter');
  if(!sel) return;
  sel.addEventListener('change', function(){
    var val = this.value;
    document.querySelectorAll('.publication-card').forEach(function(c){
      c.style.display = (val === 'all' || c.dataset.year === val) ? '' : 'none';
    });
    document.querySelectorAll('.pub-year-group').forEach(function(g){
      var vis = g.querySelectorAll('.publication-card:not([style*="none"])').length;
      g.style.display = vis ? '' : 'none';
    });
  });
})();

// Typewriter effect
(function(){
  var lines = [
    'PhD Student in Telecommunication Engineering',
    'Wireless & Multimedia Networking Lab · UGR',
    'Researcher in IoT & 5G/6G Networks',
  ];
  var el = document.getElementById('typewriter-text');
  if(!el) return;

  var line = 0, char = 0, deleting = false;

  function tick(){
    var current = lines[line];
    if(!deleting){
      el.textContent = current.slice(0, ++char);
      if(char === current.length){
        deleting = true;
        setTimeout(tick, 2200);
        return;
      }
    } else {
      el.textContent = current.slice(0, --char);
      if(char === 0){
        deleting = false;
        line = (line + 1) % lines.length;
      }
    }
    setTimeout(tick, deleting ? 38 : 68);
  }
  tick();
})();
</script>
