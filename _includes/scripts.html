<script>
// ===============================
// DARK MODE
// ===============================
(function() {
  const toggle = document.getElementById('dark-mode-toggle');
  const icon   = document.getElementById('dm-icon');
  const label  = document.getElementById('dm-label');

  function applyDark(enabled) {
    document.body.classList.toggle('dark-mode', enabled);
    localStorage.setItem('darkMode', enabled);
    if (icon)  icon.className  = enabled ? 'fas fa-sun' : 'fas fa-moon';
    if (label) label.textContent = enabled ? 'Light mode' : 'Dark mode';
  }

  // Apply saved preference on load
  const saved = localStorage.getItem('darkMode') === 'true';
  applyDark(saved);

  if (toggle) {
    toggle.addEventListener('click', function() {
      applyDark(!document.body.classList.contains('dark-mode'));
    });
  }
})();

// ===============================
// MOBILE SIDEBAR TOGGLE
// ===============================
(function() {
  const btn     = document.getElementById('sidebar-toggle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');

  function open() {
    sidebar.classList.add('open');
    overlay.classList.add('visible');
    document.body.style.overflow = 'hidden';
  }
  function close() {
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
    document.body.style.overflow = '';
  }

  if (btn)     btn.addEventListener('click', open);
  if (overlay) overlay.addEventListener('click', close);

  // Close sidebar on nav link click (mobile)
  if (sidebar) {
    sidebar.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() {
        if (window.innerWidth <= 900) close();
      });
    });
  }
})();

// ===============================
// FADE-IN ON SCROLL
// ===============================
(function() {
  const faders = document.querySelectorAll('.fade-in');
  if (!faders.length) return;

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08 });

  faders.forEach(function(el) { observer.observe(el); });
})();

// ===============================
// PUBLICATION YEAR FILTER
// ===============================
(function() {
  var select = document.getElementById('year-filter');
  if (!select) return;

  select.addEventListener('change', function() {
    var val = this.value;
    document.querySelectorAll('.publication-card').forEach(function(card) {
      var show = (val === 'all' || card.dataset.year === val);
      card.style.display = show ? '' : 'none';
    });
    // Hide empty year groups
    document.querySelectorAll('.pub-year-group').forEach(function(group) {
      var visible = group.querySelectorAll('.publication-card:not([style*="none"])').length;
      group.style.display = visible ? '' : 'none';
    });
  });
})();
</script>
